<!doctype html>
<html lang="id" class="h-full">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Link FarCath RSDK - Profesional Lanskap + Background Konsisten</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600&family=Sora:wght@600&display=swap" rel="stylesheet" />
  <style>
    html, body {
      height: 100%;
      margin: 0;
      font-family: var(--font-family, 'Outfit'), sans-serif;
      color: var(--text-color, #f3f4f6);
      /* Background image + overlay gradient, fixed full viewport */
      background:
        linear-gradient(rgba(0,0,0,0.55), rgba(0,0,0,0.65)),
        url("https://putraselarassentosa.com/uploads/posts/client/20191014054447.jpg") no-repeat center center fixed;
      background-size: cover;
      transition: color 0.3s ease, font-family 0.3s ease;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      overflow: hidden;
    }

    /* Containers have transparent background without blur */
    #pin-screen, #app-wrapper {
      height: 100vh;
      background-color: transparent !important;
      overflow: auto;
    }

    /* To ensure readable text on image, apply semi-transparent panel backgrounds */
    #pin-screen > div, #app-wrapper > aside, #app-wrapper > main {
      background-color: rgba(255 255 255 / 0.85);
      border-radius: 0.75rem;
      box-shadow: 0 8px 24px rgb(0 0 0 / 0.12);
    }

    h1, h2, h3, p, label, button, input, select {
      color: #111827; /* dark gray text */
    }

    .fade-in { animation: fadeUp 0.35s ease forwards; opacity: 0; }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(8px);}
      to { opacity: 1; transform: translateY(0); }
    }

    /* Scrollbar styling */
    ::-webkit-scrollbar {
      width: 8px; height: 8px;
    }
    ::-webkit-scrollbar-thumb {
      background: rgba(55,65,81,0.4);
      border-radius: 4px;
    }
    ::-webkit-scrollbar-track {
      background: transparent;
    }

    /* Modal backdrop */
    #modal.modal-backdrop {
      background: rgba(0,0,0,0.35);
      backdrop-filter: none;
    }

    /* Toast */
    .toast {
      animation: toastIn 0.3s ease forwards;
      font-weight: 600;
      border-radius: 0.375rem;
      padding: 0.5rem 1rem;
      box-shadow: 0 8px 16px rgba(0,0,0,0.15);
      max-width: 260px;
      text-align: center;
      user-select: none;
    }
    @keyframes toastIn {
      from {opacity:0;transform: translateY(20px);}
      to {opacity: 1; transform: translateY(0);}
    }

    /* Selected icon style */
    .icon-option.selected {
      box-shadow: 0 0 0 2px #2563eb;
      color: #2563eb !important;
    }

    .input-text {
      width: 100%;
      padding: 0.65rem 1rem;
      border: 1px solid #d1d5db;
      border-radius: 0.5rem;
      font-size: 1rem;
      transition: border-color 0.15s ease;
    }
    .input-text:focus {
      border-color: #2563eb;
      outline: none;
    }

    .btn-num {
      background:#e0e7ff; color:#3730a3; font-weight:700; font-size:1.4rem;
      border-radius:0.5rem; box-shadow:0 2px 8px rgb(99 102 241 / 0.4);
      transition: background-color 0.15s ease;
    }
    .btn-num:hover {
      background:#c7d2fe;
      cursor:pointer;
    }

    /* Scroll for icon grid */
    #icon-grid {
      max-height: 8rem;
      overflow-y: auto;
    }
  </style>
</head>
<body>

<!-- PIN SCREEN -->
<div id="pin-screen" class="flex flex-col justify-center items-center px-8 py-16 max-w-md mx-auto">
  <div class="w-full text-center p-8">
    <div class="mb-10">
      <div class="inline-flex items-center justify-center rounded-3xl bg-blue-600 w-20 h-20 mx-auto mb-4 shadow-lg">
        <i data-lucide="lock" class="text-white" style="width:40px; height:40px;"></i>
      </div>
      <h1 class="text-3xl font-sora font-semibold mb-1">Link FarCath</h1>
      <p class="text-sm font-medium text-gray-700">Masukkan PIN untuk akses</p>
    </div>
    <div class="mb-6">
      <div id="pin-display" class="flex justify-center gap-4 mb-6">
        <div class="w-5 h-5 rounded-full bg-gray-300"></div>
        <div class="w-5 h-5 rounded-full bg-gray-300"></div>
        <div class="w-5 h-5 rounded-full bg-gray-300"></div>
        <div class="w-5 h-5 rounded-full bg-gray-300"></div>
      </div>
      <input id="pin-input" type="password" inputmode="numeric" maxlength="4" placeholder="●●●●" autocomplete="off"
        class="w-full text-center py-3 text-3xl tracking-widest rounded-lg border border-gray-300 focus:outline-none focus:ring-2 focus:ring-blue-600 bg-gray-50 text-gray-700" />
      <p id="pin-error" class="mt-2 text-sm text-red-600 font-semibold hidden">PIN salah, mohon coba lagi.</p>
    </div>
    <div class="grid grid-cols-3 gap-4 max-w-xs mx-auto">
      <button onclick="addPin('1')" class="btn-num">1</button>
      <button onclick="addPin('2')" class="btn-num">2</button>
      <button onclick="addPin('3')" class="btn-num">3</button>

      <button onclick="addPin('4')" class="btn-num">4</button>
      <button onclick="addPin('5')" class="btn-num">5</button>
      <button onclick="addPin('6')" class="btn-num">6</button>

      <button onclick="addPin('7')" class="btn-num">7</button>
      <button onclick="addPin('8')" class="btn-num">8</button>
      <button onclick="addPin('9')" class="btn-num">9</button>

      <button onclick="addPin('0')" class="col-span-2 btn-num">0</button>
      <button onclick="deletePin()" class="btn-num text-red-600 hover:bg-red-100">
        <i data-lucide="delete" style="width:22px;height:22px;"></i>
      </button>
    </div>
    <p class="mt-8 text-xs text-gray-500">PIN default: <code class="font-mono bg-gray-100 px-1 py-0.5 rounded">1234</code></p>
  </div>
</div>

<!-- MAIN APP -->
<div id="app-wrapper" class="hidden h-full flex flex-row text-gray-800 max-w-screen-xl mx-auto py-12 px-6 gap-6">

  <!-- SIDEBAR -->
  <aside class="w-72 bg-white p-8 rounded-lg shadow-lg overflow-y-auto">
    <div class="flex flex-col items-center mb-10 select-none">
      <div class="w-20 h-20 rounded-full bg-gradient-to-tr from-indigo-600 to-purple-700 flex items-center justify-center text-white text-4xl font-bold font-sora mb-4 shadow-lg">
        RSDK
      </div>
      <h2 class="font-sora font-semibold text-xl text-center text-indigo-900 mb-1">Link FarCath RSDK</h2>
      <p class="text-sm text-indigo-700 font-medium text-center leading-relaxed">Kumpulan Link Farmasi CathLab</p>
    </div>
    <button onclick="openModal()" class="w-full mb-8 rounded-lg border border-indigo-700 text-indigo-700 hover:bg-indigo-100 font-semibold py-3 shadow-sm transition-colors flex items-center justify-center gap-2">
      <i data-lucide="plus" class="w-5 h-5"></i> Tambah Link
    </button>
  </aside>

  <!-- CONTENT -->
  <main class="flex-1 p-8 bg-white rounded-lg shadow-lg overflow-y-auto">
    <section id="links-list" class="grid grid-cols-1 md:grid-cols-2 gap-6"></section>
    <div id="empty-state" class="hidden text-center mt-20 text-gray-500 space-y-4">
      <i data-lucide="link" class="mx-auto w-14 h-14"></i>
      <p class="text-lg font-semibold">Belum ada link</p>
      <p class="text-sm max-w-md mx-auto">Klik tombol <strong>Tambah Link</strong> di kiri untuk membuat link baru.</p>
    </div>
  </main>

</div>

<!-- MODAL -->
<div id="modal" class="fixed inset-0 z-50 hidden modal-backdrop flex items-center justify-center p-6">
  <div class="bg-white rounded-2xl max-w-md w-full shadow-xl p-8 relative">
    <button onclick="closeModal()" class="absolute top-4 right-4 text-gray-400 hover:text-gray-600 transition" aria-label="Tutup modal">
      <i data-lucide="x" class="w-6 h-6"></i>
    </button>
    <h3 id="modal-title" class="text-2xl font-sora font-semibold mb-6 text-gray-800">Tambah Link</h3>
    <form id="link-form" class="space-y-5" onsubmit="handleSubmit(event)">
      <input type="hidden" id="edit-id" value="" />
      <div>
        <label for="link-title" class="block mb-1 font-semibold text-gray-700">Judul</label>
        <input id="link-title" type="text" required placeholder="Contoh: Portfolio" class="input-text" autocomplete="off" />
      </div>
      <div>
        <label for="link-url" class="block mb-1 font-semibold text-gray-700">URL</label>
        <input id="link-url" type="url" required placeholder="https://..." class="input-text" autocomplete="off" />
      </div>
      <div>
        <label for="link-group" class="block mb-1 font-semibold text-gray-700">Kumpulan</label>
        <input id="link-group" type="text" placeholder="Misal: Kumpulan A" class="input-text" autocomplete="off" />
      </div>
      <div>
        <label class="block mb-2 font-semibold text-gray-700">Ikon</label>
        <div id="icon-grid" class="grid grid-cols-8 gap-2 rounded border border-gray-300 p-2 max-h-32 overflow-y-auto"></div>
      </div>
      <button id="submit-btn" type="submit" class="w-full py-3 mt-4 font-semibold rounded-lg bg-indigo-600 text-white hover:bg-indigo-700 transition-shadow shadow">
        Simpan
      </button>
    </form>
  </div>
</div>

<!-- TOAST -->
<div id="toast-container" class="fixed bottom-8 left-1/2 transform -translate-x-1/2 z-50 space-y-2"></div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.1.0/firebase-app.js";
  import {
    getFirestore, collection, query,
    orderBy, onSnapshot, addDoc,
    updateDoc, deleteDoc, doc
  } from "https://www.gstatic.com/firebasejs/10.1.0/firebase-firestore.js";

  // Firebase config
  const firebaseConfig = {
    apiKey: "AIzaSyAZd6TXu4O1m2ELQrc5h2iG5bsPl2ojalY",
    authDomain: "linknya-farmasi-cath.firebaseapp.com",
    projectId: "linknya-farmasi-cath",
    storageBucket: "linknya-farmasi-cath.firebasestorage.app",
    messagingSenderId: "480135086772",
    appId: "1:480135086772:web:f3bd3fe779c27e04af0de1",
    measurementId: "G-QG17ZXLEEN"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);
  const linksCollection = collection(db, "links");
  const linksQuery = query(linksCollection, orderBy("order", "asc"));

  // PIN vars
  const CORRECT_PIN = "1234";
  let currentPin = "";
  let isAuthenticated = false;

  // Icons array
  const ICONS = [
    'globe','instagram','twitter','youtube','github','linkedin','mail','phone',
    'shopping-bag','music','camera','coffee','book-open','map-pin','heart','star',
    'zap','code','palette','film','headphones','mic','gift','briefcase'
  ];

  let allLinks = [];
  let selectedIcon = "globe";
  let editingRecord = null;

  /* PIN Input logic */
  function addPin(digit) {
    if (currentPin.length >= 4) return;
    currentPin += digit;
    updatePinDisplay();
    if (currentPin.length === 4) {
      setTimeout(checkPin, 250);
    }
  }
  function deletePin() {
    if (currentPin.length === 0) return;
    currentPin = currentPin.slice(0, -1);
    updatePinDisplay();
    hidePinError();
  }
  function updatePinDisplay() {
    const dots = document.querySelectorAll("#pin-display > div");
    dots.forEach((dot, i) => {
      dot.style.backgroundColor = i < currentPin.length ? "#4f46e5" : "#d1d5db";
    });
    document.getElementById("pin-input").value = "".padStart(currentPin.length, "●");
  }
  function hidePinError() {
    document.getElementById("pin-error").classList.add("hidden");
  }
  function showPinError() {
    document.getElementById("pin-error").classList.remove("hidden");
  }
  function checkPin() {
    if (currentPin === CORRECT_PIN) {
      isAuthenticated = true;
      document.getElementById("pin-screen").classList.add("hidden");
      document.getElementById("app-wrapper").classList.remove("hidden");
      startRealtimeListener();
    } else {
      showPinError();
      currentPin = "";
      updatePinDisplay();
      document.getElementById("pin-input").value = "";
    }
  }

  /* Firestore realtime listener */
  function startRealtimeListener() {
    onSnapshot(linksQuery, snapshot => {
      const links = [];
      snapshot.forEach(docSnap => {
        links.push({ __backendId: docSnap.id, ...docSnap.data() });
      });
      allLinks = links;
      renderLinks();
    });
  }

  /* Render grouped links */
  function renderLinks() {
    const container = document.getElementById("links-list");
    container.innerHTML = "";
    if (!allLinks.length) {
      document.getElementById("empty-state").classList.remove("hidden");
      return;
    }
    document.getElementById("empty-state").classList.add("hidden");

    const groups = {};
    allLinks.forEach(link => {
      const group = link.group || "Umum";
      if (!groups[group]) groups[group] = [];
      groups[group].push(link);
    });

    Object.entries(groups).forEach(([groupName, links]) => {
      const header = document.createElement("h3");
      header.textContent = groupName;
      header.className = "col-span-full font-sora font-semibold text-indigo-700 mb-3 border-b border-indigo-200 pb-1";
      container.appendChild(header);

      links.forEach(link => container.appendChild(createLinkCard(link)));
    });

    lucide.createIcons();
  }

  /* Create link card */
  function createLinkCard(link) {
    const el = document.createElement("article");
    el.className = "relative flex items-center gap-4 p-4 bg-white rounded-lg shadow hover:shadow-md transition cursor-pointer select-none";

    el.innerHTML = `
      <div class="flex justify-center items-center w-12 h-12 rounded-lg bg-indigo-100 text-indigo-600 text-lg">
        <i data-lucide="${link.icon || 'globe'}" class="w-6 h-6"></i>
      </div>
      <div class="flex-grow min-w-0">
        <h3 class="font-semibold text-gray-900 truncate">${sanitizeHtml(link.title)}</h3>
        <p class="text-sm text-gray-500 truncate">${sanitizeHtml(link.url)}</p>
      </div>
      <div class="flex gap-2">
        <button title="Edit" aria-label="Edit link" class="btn-edit p-2 text-indigo-600 hover:bg-indigo-50 rounded-lg transition">
          <i data-lucide="edit-2" class="w-5 h-5"></i>
        </button>
        <button title="Delete" aria-label="Hapus link" class="btn-delete p-2 text-red-500 hover:bg-red-50 rounded-lg transition">
          <i data-lucide="trash-2" class="w-5 h-5"></i>
        </button>
      </div>
    `;

    el.querySelector(".btn-edit").addEventListener("click", e => {
      e.stopPropagation();
      openEditModal(link);
    });
    el.querySelector(".btn-delete").addEventListener("click", e => {
      e.stopPropagation();
      if (confirm(`Hapus link "${link.title}"? Ini tidak bisa dibatalkan.`)) {
        deleteLink(link);
      }
    });

    el.addEventListener("click", () => {
      window.open(normalizeUrl(link.url), "_blank", "noopener,noreferrer");
    });

    return el;
  }

  /* Sanitize */
  function sanitizeHtml(text) {
    const div = document.createElement("div");
    div.textContent = text;
    return div.innerHTML;
  }

  /* Normalize URL */
  function normalizeUrl(url) {
    if (/^https?:\/\//i.test(url)) return url;
    return "https://" + url;
  }

  /* Modal open/edit/reset/close */
  function openModal() {
    editingRecord = null;
    resetModalForm();
    document.getElementById("modal-title").textContent = "Tambah Link";
    document.getElementById("submit-btn").textContent = "Simpan";
    selectedIcon = "globe";
    buildIconGrid();
    document.getElementById("modal").classList.remove("hidden");
  }

  function openEditModal(link) {
    editingRecord = link;
    document.getElementById("modal-title").textContent = "Edit Link";
    document.getElementById("submit-btn").textContent = "Perbarui";
    document.getElementById("edit-id").value = link.__backendId;
    document.getElementById("link-title").value = link.title;
    document.getElementById("link-url").value = link.url;
    document.getElementById("link-group").value = link.group || "";
    selectedIcon = link.icon || "globe";
    buildIconGrid();
    document.getElementById("modal").classList.remove("hidden");
  }

  function resetModalForm() {
    document.getElementById("edit-id").value = "";
    document.getElementById("link-title").value = "";
    document.getElementById("link-url").value = "";
    document.getElementById("link-group").value = "";
  }

  function closeModal() {
    document.getElementById("modal").classList.add("hidden");
  }

  function buildIconGrid() {
    const grid = document.getElementById("icon-grid");
    grid.innerHTML = "";
    ICONS.forEach(iconName => {
      const btn = document.createElement("button");
      btn.type = "button";
      btn.className = "icon-option p-2 rounded-md hover:bg-indigo-100";
      if (iconName === selectedIcon) btn.classList.add("selected");
      btn.innerHTML = `<i data-lucide="${iconName}" class="w-6 h-6"></i>`;
      btn.addEventListener("click", () => {
        selectedIcon = iconName;
        buildIconGrid();
      });
      grid.appendChild(btn);
    });
    lucide.createIcons();
  }

  /* Handle form submit */
  async function handleSubmit(e) {
    e.preventDefault();
    const btn = document.getElementById("submit-btn");
    btn.disabled = true;
    btn.textContent = "Menyimpan...";

    const title = document.getElementById("link-title").value.trim();
    const url = document.getElementById("link-url").value.trim();
    const group = document.getElementById("link-group").value.trim();

    if (!title || !url) {
      alert("Judul dan URL harus diisi!");
      btn.disabled = false;
      btn.textContent = editingRecord ? "Perbarui" : "Simpan";
      return;
    }

    try {
      if (editingRecord) {
        const ref = doc(db, "links", editingRecord.__backendId);
        await updateDoc(ref, {
          title, url, group, icon: selectedIcon, order: editingRecord.order || Date.now()
        });
      } else {
        if (allLinks.length >= 999) {
          alert("Batas maksimum 999 link tercapai");
          btn.disabled = false;
          btn.textContent = "Simpan";
          return;
        }
        await addDoc(linksCollection, {
          title, url, group, icon: selectedIcon, order: Date.now()
        });
      }
      closeModal();
      showToast(editingRecord ? "Link diperbarui!" : "Link ditambahkan!");
    } catch (err) {
      console.error(err);
      alert("Gagal menyimpan link. Coba lagi.");
    } finally {
      btn.disabled = false;
      btn.textContent = editingRecord ? "Perbarui" : "Simpan";
    }
  }

  /* Delete link */
  async function deleteLink(link) {
    try {
      const ref = doc(db, "links", link.__backendId);
      await deleteDoc(ref);
      showToast("Link dihapus");
    } catch (err) {
      console.error(err);
      alert("Gagal menghapus link. Coba lagi.");
    }
  }

  /* Toast */
  function showToast(msg) {
    const container = document.getElementById("toast-container");
    const toast = document.createElement("div");
    toast.className = "toast bg-indigo-600 text-white";
    toast.textContent = msg;
    container.appendChild(toast);
    setTimeout(() => toast.remove(), 2500);
  }

  /* Modal backdrop close */
  document.getElementById("modal").addEventListener("click", e => {
    if (e.target === document.getElementById("modal")) closeModal();
  });

  /* Global functions */
  window.addPin = addPin;
  window.deletePin = deletePin;
  window.openModal = openModal;
  window.closeModal = closeModal;
  window.handleSubmit = handleSubmit;
  window.openEditModal = openEditModal;

  /* Initialize lucide icons */
  lucide.createIcons();

</script>

</body>
</html>
